# Copy this file to secrets.toml (same folder) and set real values.
#   cp .streamlit/secrets.example.toml .streamlit/secrets.toml
# secrets.toml is gitignored — never commit passwords.

[postgres]
host = "localhost"
port = 5432
# Database to create (scripts/init_db.py) and used by the app (data/db_utils.py)
dbname = "careerops"
# Often your macOS username for Homebrew PostgreSQL; use the role you use in pgAdmin
user = "your_username"
password = ""
